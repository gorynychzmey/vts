<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=__VTS_VERSION__" />
  </head>
  <body>
    <div class="bg-shape"></div>
    <main class="layout">
      <header>
        <h1 data-i18n="header.title">Video Transcribe &amp; Summarize</h1>
        <p data-i18n="header.subtitle">Queue URL, monitor pipeline, inspect transcript and summary artifacts.</p>
        <div class="header-version">
          <span class="context-label" data-i18n="header.version">Version:</span>
          <span id="app-version" class="mono">-</span>
        </div>
      </header>

      <section class="card user-context">
        <div class="context-line">
          <span class="context-label" data-i18n="context.authenticated">Authenticated:</span>
          <span id="auth-user" class="mono">-</span>
        </div>
        <div id="admin-controls" class="context-line admin-controls hidden">
          <span class="context-label" data-i18n="context.acting_as">Working as:</span>
          <select
            id="admin-user-select"
            aria-label="Switch to user"
            data-i18n-aria-label="admin.switch_user"
            title="Switch to user"
            data-i18n-title="admin.switch_user"
          ></select>
          <button
            id="admin-apply-btn"
            class="icon-btn ghost"
            type="button"
            title="Apply"
            aria-label="Apply"
            data-i18n-title="admin.apply"
            data-i18n-aria-label="admin.apply"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m5 13 4 4L19 7" />
            </svg>
          </button>
          <button
            id="admin-reset-btn"
            class="icon-btn ghost"
            type="button"
            title="Use self"
            aria-label="Use self"
            data-i18n-title="admin.use_self"
            data-i18n-aria-label="admin.use_self"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 7v6h6M3 13a9 9 0 1 0 2.6-6.4L3 9" />
            </svg>
          </button>
        </div>
      </section>

      <section class="card">
        <h2 data-i18n="new_task.title">New Task</h2>
        <form id="task-form">
          <label for="url" class="sr-only" data-i18n="new_task.url_label">Video URL</label>
          <div class="url-row">
            <input
              id="url"
              name="url"
              type="url"
              required
              placeholder="https://youtube.com/watch?v=..."
              data-i18n-placeholder="new_task.url_placeholder"
            />
            <button
              class="icon-btn primary"
              type="submit"
              title="Create task"
              aria-label="Create task"
              data-i18n-title="action.create"
              data-i18n-aria-label="action.create"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
          </div>

          <div class="row options-row">
            <label class="option-pill">
              <input id="audio_only" name="audio_only" type="checkbox" />
              <span data-i18n="new_task.audio_only">Audio only</span>
            </label>
            <label class="option-pill">
              <input id="transcript" name="transcript" type="checkbox" checked />
              <span data-i18n="new_task.transcript">Transcript</span>
            </label>
            <label class="option-pill">
              <input id="summary" name="summary" type="checkbox" checked />
              <span data-i18n="new_task.summary">Summary</span>
            </label>
            <label class="language-control">
              <span data-i18n="new_task.language">Language</span>
              <select id="language" name="language">
                <option value="" data-i18n="new_task.language_auto">auto</option>
                <option value="en" data-i18n="new_task.language_en">English</option>
                <option value="ru" data-i18n="new_task.language_ru">Russian</option>
                <option value="de" data-i18n="new_task.language_de">German</option>
                <option value="fr" data-i18n="new_task.language_fr">French</option>
                <option value="es" data-i18n="new_task.language_es">Spanish</option>
              </select>
            </label>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="title-row">
          <h2 data-i18n="tasks.title">Tasks</h2>
          <button
            id="refresh-btn"
            class="icon-btn ghost"
            type="button"
            title="Refresh tasks"
            aria-label="Refresh tasks"
            data-i18n-title="action.refresh"
            data-i18n-aria-label="action.refresh"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6" />
            </svg>
          </button>
        </div>
        <div id="task-list" class="task-list"></div>
      </section>
    </main>

    <template id="task-template">
      <article class="task">
        <div class="task-header-row">
          <div class="task-main">
            <a class="task-link" target="_blank" rel="noopener noreferrer"></a>
            <div class="task-source mono hidden"></div>
          </div>
          <div class="task-right">
            <span class="task-status"></span>
            <span class="task-runtime mono"></span>
            <div class="task-actions-inline">
              <button
                class="icon-btn ghost pause-btn"
                type="button"
                title="Pause"
                aria-label="Pause"
                data-i18n-title="action.pause"
                data-i18n-aria-label="action.pause"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 6v12M16 6v12" />
                </svg>
              </button>
              <button
                class="icon-btn ghost resume-btn"
                type="button"
                title="Resume"
                aria-label="Resume"
                data-i18n-title="action.resume"
                data-i18n-aria-label="action.resume"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m8 6 10 6-10 6z" />
                </svg>
              </button>
              <div class="btn-menu-wrapper">
                <button
                  class="icon-btn ghost restart-summary-btn"
                  type="button"
                  title="Restart summary"
                  aria-label="Restart summary"
                  data-i18n-title="action.restart_summary"
                  data-i18n-aria-label="action.restart_summary"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 12a9 9 0 1 0 2.64-6.36L3 8" />
                    <path d="M3 3v5h5" />
                  </svg>
                </button>
                <div class="btn-menu restart-summary-menu">
                  <button class="restart-summary-full-btn" type="button">Restart summary from scratch</button>
                  <button class="restart-summary-final-btn" type="button">Restart final summary only</button>
                </div>
              </div>
              <button
                class="icon-btn ghost archive-btn"
                type="button"
                title="Archive task"
                aria-label="Archive task"
                data-i18n-title="action.archive"
                data-i18n-aria-label="action.archive"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 8h18" />
                  <path d="M5 8h14v11a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1z" />
                  <path d="M9 12h6" />
                  <path d="M4 4h16v4H4z" />
                </svg>
              </button>
              <button
                class="icon-btn ghost delete-btn danger"
                type="button"
                title="Delete"
                aria-label="Delete"
                data-i18n-title="action.delete"
                data-i18n-aria-label="action.delete"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 7h14M9 7V5h6v2M9 10v8M15 10v8M7 7l1 12h8l1-12" />
                </svg>
              </button>
            </div>
            <button
              class="icon-btn ghost toggle-btn"
              type="button"
              title="Expand"
              aria-label="Expand"
              data-i18n-title="action.expand"
              data-i18n-aria-label="action.expand"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
          </div>
        </div>

        <div class="task-body hidden">
          <div class="step-meta">
            <div class="step-label">-</div>
            <div class="step-time mono">-</div>
          </div>
          <div class="progress-stack">
            <div class="progress-group">
              <div class="progress-caption" data-i18n="progress.overall">Overall progress</div>
              <div class="step-progress overall-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100">
                <div class="step-progress-fill"></div>
                <div class="step-progress-text mono">0%</div>
              </div>
            </div>
            <div class="progress-group">
              <div class="progress-caption" data-i18n="progress.step">Current step</div>
              <div class="step-progress local-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100">
                <div class="step-progress-fill"></div>
                <div class="step-progress-text mono">0%</div>
              </div>
            </div>
          </div>
          <div class="task-message hidden" aria-live="polite"></div>

          <div class="tabs-bar">
            <div class="tabs">
              <button class="tab-btn active" data-tab="transcript" type="button" data-i18n="tab.transcript">
                Transcript
              </button>
              <button class="tab-btn" data-tab="summary" type="button" data-i18n="tab.summary">Summary</button>
              <button class="tab-btn" data-tab="log" type="button" data-i18n="tab.log">Log</button>
            </div>
            <div class="tab-actions">
              <button
                class="icon-btn ghost tab-copy-btn"
                type="button"
                title="Copy active tab"
                aria-label="Copy active tab"
                data-i18n-title="action.copy_tab"
                data-i18n-aria-label="action.copy_tab"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 9h11v11H9z" />
                  <path d="M6 15H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h9a1 1 0 0 1 1 1v1" />
                </svg>
              </button>
              <button
                class="icon-btn ghost tab-save-btn"
                type="button"
                title="Save active tab"
                aria-label="Save active tab"
                data-i18n-title="action.save_tab"
                data-i18n-aria-label="action.save_tab"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 3h11l3 3v15H5z" />
                  <path d="M8 3v6h8V3" />
                  <path d="M9 14h6" />
                </svg>
              </button>
            </div>
          </div>
          <pre class="tab-content transcript active"></pre>
          <pre class="tab-content summary"></pre>
          <pre class="tab-content log"></pre>
        </div>
      </article>
    </template>

    <script>
      window.__VTS_BUILD_VERSION__ = "__VTS_VERSION__";
    </script>
    <script src="/static/app.js?v=__VTS_VERSION__"></script>
  </body>
</html>
