<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=__VTS_VERSION__" />
  </head>
  <body>
    <div class="bg-shape"></div>
    <main class="layout">
      <header>
        <h1>Video Transcribe &amp; Summarize</h1>
        <p>Queue URL, monitor pipeline, inspect transcript and summary artifacts.</p>
        <div class="header-version">
          <span class="context-label">Version:</span>
          <span id="app-version" class="mono">-</span>
        </div>
      </header>

      <section class="card user-context">
        <div class="context-line">
          <span class="context-label">Authenticated:</span>
          <span id="auth-user" class="mono">-</span>
        </div>
        <div class="context-line">
          <span class="context-label">Working as:</span>
          <span id="acting-user" class="mono">-</span>
        </div>
      </section>

      <section id="admin-panel" class="card hidden">
        <h2>Admin Panel</h2>
        <div class="admin-row">
          <label for="admin-user-select">Switch to user</label>
          <select id="admin-user-select"></select>
          <button id="admin-apply-btn" type="button">Apply</button>
          <button id="admin-reset-btn" type="button">Use self</button>
        </div>
      </section>

      <section class="card">
        <h2>New Task</h2>
        <form id="task-form">
          <label for="url">Video URL</label>
          <input id="url" name="url" type="url" required placeholder="https://youtube.com/watch?v=..." />
          <div class="row">
            <label class="checkbox">
              <input id="include_word_timestamps" name="include_word_timestamps" type="checkbox" checked />
              Include word timestamps
            </label>
            <label class="checkbox">
              <input id="force_reprocess" name="force_reprocess" type="checkbox" />
              Force reprocess
            </label>
          </div>
          <label for="language">Language</label>
          <select id="language" name="language">
            <option value="">auto</option>
            <option value="en">English</option>
            <option value="ru">Russian</option>
            <option value="de">German</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
          </select>
          <button type="submit">Create Task</button>
        </form>
      </section>

      <section class="card">
        <div class="title-row">
          <h2>Tasks</h2>
          <button id="refresh-btn" type="button">Refresh</button>
        </div>
        <div id="task-list" class="task-list"></div>
      </section>
    </main>

    <template id="task-template">
      <article class="task">
        <button class="task-header" type="button">
          <span class="task-url"></span>
          <span class="task-status"></span>
        </button>
        <div class="task-body hidden">
          <div class="progress-grid">
            <div>
              <label>Video</label>
              <progress class="video-progress" max="1" value="0"></progress>
            </div>
            <div>
              <label>Audio</label>
              <progress class="audio-progress" max="1" value="0"></progress>
            </div>
          </div>
          <div class="llama-loading hidden">
            <span class="spinner-dot" aria-hidden="true"></span>
            <span>Loading LLM model...</span>
          </div>
          <div class="task-actions">
            <button class="pause-btn" type="button">Pause</button>
            <button class="resume-btn" type="button">Resume</button>
            <button class="delete-btn" type="button">Delete</button>
          </div>
          <div class="tabs">
            <button class="tab-btn active" data-tab="transcript" type="button">Transcript</button>
            <button class="tab-btn" data-tab="summary" type="button">Summary</button>
            <button class="tab-btn" data-tab="log" type="button">Log</button>
          </div>
          <pre class="tab transcript active"></pre>
          <pre class="tab summary"></pre>
          <pre class="tab log"></pre>
        </div>
      </article>
    </template>

    <script>
      window.__VTS_BUILD_VERSION__ = "__VTS_VERSION__";
    </script>
    <script src="/static/app.js?v=__VTS_VERSION__"></script>
  </body>
</html>
