<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css?v=__VTS_VERSION__" />
  </head>
  <body>
    <div class="bg-shape"></div>
    <main class="layout">
      <header>
        <h1>Video Transcribe &amp; Summarize</h1>
        <p>Queue URL, monitor pipeline, inspect transcript and summary artifacts.</p>
        <div class="header-version">
          <span class="context-label">Version:</span>
          <span id="app-version" class="mono">-</span>
        </div>
      </header>

      <section class="card user-context">
        <div class="context-line">
          <span class="context-label">Authenticated:</span>
          <span id="auth-user" class="mono">-</span>
        </div>
        <div class="context-line">
          <span class="context-label">Working as:</span>
          <span id="acting-user" class="mono">-</span>
        </div>
      </section>

      <section id="admin-panel" class="card hidden">
        <h2>Admin Panel</h2>
        <div class="admin-row">
          <label for="admin-user-select">Switch to user</label>
          <select id="admin-user-select"></select>
          <button id="admin-apply-btn" type="button">Apply</button>
          <button id="admin-reset-btn" type="button">Use self</button>
        </div>
      </section>

      <section class="card">
        <h2>New Task</h2>
        <form id="task-form">
          <label for="url" class="sr-only">Video URL</label>
          <div class="url-row">
            <input id="url" name="url" type="url" required placeholder="https://youtube.com/watch?v=..." />
            <button class="icon-btn primary" type="submit" title="Create task" aria-label="Create task">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
          </div>

          <div class="row options-row">
            <label class="option-pill">
              <input id="audio_only" name="audio_only" type="checkbox" />
              Audio only
            </label>
            <label class="option-pill">
              <input id="transcript" name="transcript" type="checkbox" checked />
              Transcript
            </label>
            <label class="option-pill">
              <input id="summary" name="summary" type="checkbox" checked />
              Summary
            </label>
            <label class="language-control">
              <span>Language</span>
              <select id="language" name="language">
                <option value="">auto</option>
                <option value="en">English</option>
                <option value="ru">Russian</option>
                <option value="de">German</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
              </select>
            </label>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="title-row">
          <h2>Tasks</h2>
          <button id="refresh-btn" class="icon-btn ghost" type="button" title="Refresh tasks" aria-label="Refresh tasks">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6" />
            </svg>
          </button>
        </div>
        <div id="task-list" class="task-list"></div>
      </section>
    </main>

    <template id="task-template">
      <article class="task">
        <div class="task-header-row">
          <div class="task-main">
            <a class="task-link" target="_blank" rel="noopener noreferrer"></a>
            <div class="task-source mono hidden"></div>
          </div>
          <div class="task-right">
            <span class="task-status"></span>
            <span class="task-runtime mono"></span>
            <div class="task-actions-inline">
              <button class="icon-btn ghost pause-btn" type="button" title="Pause" aria-label="Pause">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 6v12M16 6v12" />
                </svg>
              </button>
              <button class="icon-btn ghost resume-btn" type="button" title="Resume" aria-label="Resume">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m8 6 10 6-10 6z" />
                </svg>
              </button>
              <button class="icon-btn ghost delete-btn danger" type="button" title="Delete" aria-label="Delete">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 7h14M9 7V5h6v2M9 10v8M15 10v8M7 7l1 12h8l1-12" />
                </svg>
              </button>
            </div>
            <button class="icon-btn ghost toggle-btn" type="button" title="Expand" aria-label="Expand">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
          </div>
        </div>

        <div class="task-body hidden">
          <div class="step-meta">
            <div class="step-label">Шаг -</div>
            <div class="step-time mono">-</div>
          </div>
          <div class="step-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <div class="step-progress-fill"></div>
            <div class="step-progress-text mono">0%</div>
          </div>

          <div class="tabs">
            <button class="tab-btn active" data-tab="transcript" type="button">Transcript</button>
            <button class="tab-btn" data-tab="summary" type="button">Summary</button>
            <button class="tab-btn" data-tab="log" type="button">Log</button>
          </div>
          <pre class="tab-content transcript active"></pre>
          <pre class="tab-content summary"></pre>
          <pre class="tab-content log"></pre>
        </div>
      </article>
    </template>

    <script>
      window.__VTS_BUILD_VERSION__ = "__VTS_VERSION__";
    </script>
    <script src="/static/app.js?v=__VTS_VERSION__"></script>
  </body>
</html>
