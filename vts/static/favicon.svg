<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#d65d2b"/>

  <!-- Waveform bars -->
  <rect x="8"  y="18" width="4" height="18" rx="2" fill="#fffdf6" opacity="0.9"/>
  <rect x="14" y="13" width="4" height="28" rx="2" fill="#fffdf6" opacity="0.9"/>
  <rect x="20" y="16" width="4" height="22" rx="2" fill="#fffdf6" opacity="0.9"/>
  <rect x="26" y="10" width="4" height="34" rx="2" fill="#fffdf6" opacity="0.9"/>
  <rect x="32" y="14" width="4" height="26" rx="2" fill="#fffdf6" opacity="0.9"/>

  <!-- Text lines -->
  <rect x="40" y="18" width="18" height="4" rx="2" fill="#fffdf6" opacity="0.75"/>
  <rect x="40" y="26" width="13" height="4" rx="2" fill="#fffdf6" opacity="0.60"/>
  <rect x="40" y="34" width="16" height="4" rx="2" fill="#fffdf6" opacity="0.75"/>
  <rect x="40" y="42" width="10" height="4" rx="2" fill="#fffdf6" opacity="0.55"/>

  <!-- Microphone body -->
  <rect x="8" y="44" width="8" height="11" rx="4" fill="none" stroke="#fffdf6" stroke-width="1.8" opacity="0.7"/>
  <!-- Microphone arc -->
  <path d="M5 51 Q5 60 12 60 Q19 60 19 51" fill="none" stroke="#fffdf6" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <!-- Microphone stand -->
  <line x1="12" y1="60" x2="12" y2="64" stroke="#fffdf6" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="8"  y1="64" x2="16" y2="64" stroke="#fffdf6" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
</svg>
