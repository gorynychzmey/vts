name: Deploy After Diarization Build

on:
  workflow_run:
    workflows:
      - Build Diarization Image
    types:
      - completed

concurrency:
  group: deploy-after-diarization
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Validate deploy configuration
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_HOST}" ]]; then
            echo "Missing required variable: DEPLOY_HOST (set under Repo Settings → Variables)"
            exit 1
          fi
          if [[ -z "${DEPLOY_SSH_KEY}" ]]; then
            echo "Missing required secret: DEPLOY_SSH_KEY"
            exit 1
          fi
          if [[ -z "${DEPLOY_KNOWN_HOSTS}" ]]; then
            echo "Missing required secret: DEPLOY_KNOWN_HOSTS"
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_KEY}" >"${HOME}/.ssh/deploy_key"
          chmod 600 "${HOME}/.ssh/deploy_key"
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" >"${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Deploy on server
        shell: bash
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_JUMP_HOST: ${{ vars.DEPLOY_JUMP_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          DEPLOY_REMOTE_DIR: ${{ vars.DEPLOY_REMOTE_DIR }}
          DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE }}
          DEPLOY_DIAR_ENV_FILE: ${{ vars.DEPLOY_DIAR_ENV_FILE }}
          DIARIZATION_SERVICE: ${{ vars.DIARIZATION_SERVICE }}
        run: |
          set -euo pipefail
          deploy_user="${DEPLOY_USER:-root}"
          deploy_port="${DEPLOY_PORT:-22}"
          remote_dir="${DEPLOY_REMOTE_DIR:-/opt/vts}"
          env_file="${DEPLOY_ENV_FILE:-/opt/vts/config/vts.env}"
          # The diarization sidecar keeps its own env file (DIARIZATION_IMAGE +
          # DIAR_* tuning), deliberately separate from vts.env so app secrets
          # never reach the sidecar. Sourced in addition to vts.env below.
          diar_env_file="${DEPLOY_DIAR_ENV_FILE:-/opt/vts/config/diar.env}"
          diar_service="${DIARIZATION_SERVICE:-vts-diarization.service}"

          proxy_args=()
          if [[ -n "${DEPLOY_JUMP_HOST:-}" ]]; then
            printf 'Host jump\n  HostName %s\n  User %s\n  IdentityFile %s/.ssh/deploy_key\n  StrictHostKeyChecking yes\n  UserKnownHostsFile %s/.ssh/known_hosts\n' \
              "${DEPLOY_JUMP_HOST}" "${deploy_user}" "${HOME}" "${HOME}" >"${HOME}/.ssh/config"
            chmod 600 "${HOME}/.ssh/config"
            proxy_args=(-o ProxyJump=jump)
          fi

          ssh -i "${HOME}/.ssh/deploy_key" \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            -p "${deploy_port}" \
            "${proxy_args[@]}" \
            "${deploy_user}@${DEPLOY_HOST}" \
            "REMOTE_DIR='${remote_dir}' ENV_FILE='${env_file}' DIAR_ENV_FILE='${diar_env_file}' DIARIZATION_SERVICE='${diar_service}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${REMOTE_DIR}"
          set -a
          source "${ENV_FILE}"
          # DIARIZATION_IMAGE + DIAR_* live in the diarization-only env file, kept
          # apart from vts.env so the sidecar never sees app secrets. Source it
          # after vts.env (present on any host with a diarization sidecar); its
          # values win for the diarization vars. Absent file → fall back to
          # whatever vts.env carried, so an older host layout still deploys.
          if [[ -f "${DIAR_ENV_FILE}" ]]; then
            source "${DIAR_ENV_FILE}"
          fi
          set +a
          # The prod host runs systemd units, not compose, so it needs the fully
          # resolved reference (repo:version), not the compose-time split vars.
          if [[ -z "${DIARIZATION_IMAGE:-}" ]]; then
            echo "Set DIARIZATION_IMAGE in ${DIAR_ENV_FILE} (or ${ENV_FILE})"
            exit 1
          fi
          podman pull "${DIARIZATION_IMAGE}"
          sudo systemctl restart "${DIARIZATION_SERVICE}"
          sudo systemctl status "${DIARIZATION_SERVICE}" --no-pager
          REMOTE
