name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vts
          POSTGRES_PASSWORD: vts
          POSTGRES_DB: vts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vts"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          VTS_TEST_DATABASE_URL: postgresql+asyncpg://vts:vts@localhost:5432/vts_test
        run: python -m pytest -q

  audit:
    name: pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit runtime requirements for known vulnerabilities
        # --strict makes pip-audit exit non-zero on resolution errors too,
        # not just on found vulnerabilities — catches situations where the
        # requirements file no longer resolves cleanly.
        # If a CVE is published before a fix exists upstream, add a one-line
        # `--ignore-vuln <ID>` here with a comment pointing at the tracking
        # issue, rather than blocking the whole pipeline.
        run: pip-audit --strict --requirement requirements.txt
