name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      # The cluster superuser is `postgres`; the `vts` role tests connect as is
      # created unprivileged in the "Provision test database" step below, so CI
      # has the same privilege shape as production (vts-e1p).
      postgres:
        image: tensorchord/vchord-postgres:pg17-v1.1.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Mirrors scripts/pg-init-app-role.sh: an unprivileged app role plus
      # superuser-installed extensions. Tests must not be able to CREATE
      # EXTENSION themselves — that privilege gap is what this guards.
      - name: Provision test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE vts LOGIN PASSWORD 'vts'" \
            -c "CREATE DATABASE vts_test OWNER vts"
          psql -h localhost -U postgres -d vts_test -v ON_ERROR_STOP=1 \
            -c "CREATE EXTENSION IF NOT EXISTS vector"
          psql -h localhost -U postgres -d vts_test -tAc \
            "SELECT rolsuper FROM pg_roles WHERE rolname = 'vts'" | grep -qx f \
            || { echo "app role 'vts' must not be a superuser"; exit 1; }

      - name: Run tests
        env:
          VTS_TEST_DATABASE_URL: postgresql+asyncpg://vts:vts@localhost:5432/vts_test
        run: python -m pytest -q

  audit:
    name: pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit runtime requirements for known vulnerabilities
        # --strict makes pip-audit exit non-zero on resolution errors too,
        # not just on found vulnerabilities — catches situations where the
        # requirements file no longer resolves cleanly.
        # If a CVE is published before a fix exists upstream, add a one-line
        # `--ignore-vuln <ID>` here with a comment pointing at the tracking
        # issue, rather than blocking the whole pipeline.
        run: pip-audit --strict --requirement requirements.txt
