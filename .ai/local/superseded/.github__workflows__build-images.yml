name: Build Images

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: "Build version in semver format X.Y.Z (optional for manual run)"
        required: false
        default: ""
      dockerhub_image_repo:
        description: "Docker Hub image repository (e.g. docker.io/gorynychzmey/vts)"
        required: false
        default: ""
      ghcr_image_repo:
        description: "GHCR image repository (e.g. ghcr.io/<owner>/vts)"
        required: false
        default: ""
  push:
    tags:
      - "build-*"

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image repositories
        id: repos
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          dockerhub_input="${{ github.event.inputs.dockerhub_image_repo || '' }}"
          ghcr_input="${{ github.event.inputs.ghcr_image_repo || '' }}"
          dockerhub_var="${{ vars.DOCKERHUB_IMAGE_REPO || '' }}"
          ghcr_var="${{ vars.GHCR_IMAGE_REPO || '' }}"
          build_version_input="${{ github.event.inputs.build_version || '' }}"

          if [[ -n "${dockerhub_input}" ]]; then
            dockerhub_repo="${dockerhub_input}"
          elif [[ -n "${dockerhub_var}" ]]; then
            dockerhub_repo="${dockerhub_var}"
          else
            dockerhub_repo="docker.io/gorynychzmey/vts"
          fi

          if [[ -n "${ghcr_input}" ]]; then
            ghcr_repo="${ghcr_input}"
          elif [[ -n "${ghcr_var}" ]]; then
            ghcr_repo="${ghcr_var}"
          else
            ghcr_repo="ghcr.io/${owner_lc}/vts"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == build-* ]]; then
            version="${GITHUB_REF_NAME#build-}"
          elif [[ -n "${build_version_input}" ]]; then
            version="${build_version_input}"
          else
            version="$(python scripts/get_version.py)"
          fi

          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid build version '${version}'. Expected semver X.Y.Z."
            exit 1
          fi

          echo "dockerhub_repo=${dockerhub_repo}" >>"${GITHUB_OUTPUT}"
          echo "ghcr_repo=${ghcr_repo}" >>"${GITHUB_OUTPUT}"
          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "Using Docker Hub repo: ${dockerhub_repo}"
          echo "Using GHCR repo: ${ghcr_repo}"
          echo "Version: ${version}"

      - name: Validate Docker Hub secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" || -z "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, test, and push images to GHCR
        shell: bash
        env:
          CONTAINER_ENGINE: docker
          USE_BUILDX: auto
          BUILDX_CACHE_REPO: ${{ steps.repos.outputs.ghcr_repo }}
          BUILDX_CACHE_MODE: max
          IMAGE_REPO: ${{ steps.repos.outputs.ghcr_repo }}
          VERSION_OVERRIDE: ${{ steps.repos.outputs.version }}
        run: |
          set -euo pipefail
          bash ./build.sh

      - name: Mirror GHCR images to Docker Hub
        shell: bash
        env:
          DOCKERHUB_REPO: ${{ steps.repos.outputs.dockerhub_repo }}
          GHCR_REPO: ${{ steps.repos.outputs.ghcr_repo }}
          VERSION: ${{ steps.repos.outputs.version }}
        run: |
          set -euo pipefail
          docker tag "${GHCR_REPO}:${VERSION}" "${DOCKERHUB_REPO}:${VERSION}"
          docker tag "${GHCR_REPO}:latest" "${DOCKERHUB_REPO}:latest"
          docker push "${DOCKERHUB_REPO}:${VERSION}"
          docker push "${DOCKERHUB_REPO}:latest"
